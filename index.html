<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 魔法故事屋</title>
<style>
  :root{
    --paper:#f7efda; --ink:#46382a; --soft:#9a8a72; --line:#e0cfae;
    --rose:#ff8fb1; --rose-d:#e86f95; --peach:#ffb27a; --sky:#8fd0ff;
    --mint:#8fe0c0; --lav:#b3a4ff; --gold:#ffd86b; --cream:#f1e6cc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;min-height:100vh;color:var(--ink);
    font-family:"Nunito","Baloo 2","Microsoft JhengHei","PingFang TC","Segoe UI Emoji",system-ui,sans-serif;
    /* 自訂底圖優先：把圖片放到 assets/theme/background.png（或 .jpg）就會自動採用；
       沒放圖時，下面的深紫色魔法夜空漸層會自動當底色 */
    background-color:#0e0620;
    background-image:
      url("assets/theme/background.png"),
      url("assets/theme/background.jpg"),
      radial-gradient(ellipse 900px 700px at 12% 78%, rgba(100,35,200,.55) 0%, transparent 55%),
      radial-gradient(ellipse 700px 500px at 88% 22%, rgba(120,50,220,.45) 0%, transparent 55%),
      radial-gradient(ellipse 500px 350px at 50% 5%, rgba(80,20,160,.4) 0%, transparent 60%),
      radial-gradient(ellipse 1200px 500px at 50% 60%, rgba(30,8,80,.7) 0%, transparent 70%),
      linear-gradient(180deg,#080312 0%, #110724 50%, #0c051a 100%);
    background-repeat:no-repeat,no-repeat,no-repeat,no-repeat,no-repeat,no-repeat,no-repeat;
    background-position:center center,center center,center,center,center,center,center;
    background-size:cover,cover,auto,auto,auto,auto,auto;
    background-attachment:fixed;
    padding:18px;}
  .wrap{max-width:800px;margin:0 auto;position:relative;z-index:1;}
  header.top{display:flex;align-items:center;justify-content:center;margin:12px 2px 20px;}

  .card{background:#f6ecd5;border-radius:24px;padding:16px 18px;margin-bottom:14px;
    box-shadow:0 10px 30px rgba(70,45,20,.22);border:1px solid var(--line);}
  .card h2{font-size:16px;margin:0 0 12px;display:flex;align-items:center;gap:8px;font-weight:800;}
  .optpanel{background:none !important;border:none !important;box-shadow:none !important;padding:8px 0 !important;}
  .optpanel h2{color:#f5e8c0;text-shadow:0 1px 6px rgba(0,0,0,.6);}
  .preview-card{background:none !important;border:none !important;box-shadow:none !important;padding:0 !important;}
  .preview-card h2{display:none !important;}
  .preview-wrap{position:relative;width:100%;}
  .preview-img{width:100%;height:auto;display:block;border-radius:16px;}
  .prev-cap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:85%;text-align:center;color:#fff !important;font-weight:700;
    text-shadow:0 1px 6px rgba(0,0,0,.7);pointer-events:none;}
  .opts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  @media(max-width:560px){.opts{grid-template-columns:repeat(3,1fr);gap:5px;}}
  .opt{cursor:pointer;border:none;border-radius:16px;padding:14px 6px 10px;
    text-align:center;background:none;transition:.16s ease;user-select:none;position:relative;}
  .opt:hover{transform:translateY(-4px);}
  .opt .e{font-size:88px;line-height:1.05;}
  .opt .l{display:block;font-size:18px;margin-top:10px;font-weight:900;
    color:#fff;text-shadow:0 0 10px rgba(140,60,255,.9),0 1px 4px rgba(0,0,0,.8);
    letter-spacing:.5px;}
  .opt.sel{background:rgba(255,230,100,.25);
    box-shadow:0 6px 16px rgba(255,200,60,.3);transform:translateY(-3px) scale(1.03);}
  .opt.sel::after{content:"✓";position:absolute;top:4px;right:6px;font-size:11px;
    color:#fff;background:var(--rose);border-radius:50%;width:16px;height:16px;line-height:16px;font-weight:800;}

  /* 分頁式選擇器：圖片按鈕版 */
  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
  .tab{font-family:inherit;cursor:pointer;border:none;border-radius:0;
    background:none;padding:0;transition:.15s ease;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;min-width:0;gap:4px;}
  .tab-bg-img{width:100%;height:auto;display:block;object-fit:contain;transition:.15s ease;}
  .tab:hover .tab-bg-img{transform:translateY(-3px);filter:brightness(1.08);}
  .tab.active .tab-bg-img{transform:translateY(-3px);filter:brightness(1.12);}
  .tab .tab-pick{font-size:11px;font-weight:700;color:#e8d0ff;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tab .tab-pick.none{color:rgba(220,200,255,.4);font-weight:600;}
  .tab-no-img{border:2px solid var(--line) !important;border-radius:16px !important;
    background:#f6ecd5 !important;padding:9px 6px 8px !important;}
  .optpanel{animation:pop .3s cubic-bezier(.2,.9,.3,1.3);}
  /* 主按鈕：圖片版 */
  .img-btn{background:none !important;box-shadow:none !important;
    padding:0 !important;border:none !important;min-width:0 !important;flex:none;}
  .img-btn img{display:block;height:92px;width:auto;object-fit:contain;transition:.12s;}
  .img-btn:active img{transform:scale(.95) translateY(3px);}
  .img-btn:disabled{opacity:.55;}
  @media(max-width:560px){
    .tabs{gap:5px;}
    .tab .tab-pick{font-size:10px;}
    .img-btn img{height:70px;}
  }

  .controls{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 28px;justify-content:center;}
  .big{flex:1;min-width:170px;border:none;border-radius:20px;cursor:pointer;
    font-family:inherit;font-size:18px;font-weight:800;color:#fff;padding:15px;
    box-shadow:0 8px 0 rgba(0,0,0,.10);transition:.1s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .big:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.10);}
  .big:disabled{opacity:.55;cursor:wait;}
  .gen{background:linear-gradient(90deg,#ff7eb3,#ff9a62);}
  .rand{background:linear-gradient(90deg,#7fc8ff,#9b8cff);flex:0 0 auto;min-width:120px;font-size:16px;}
  /* 手機：改用畫面底部「固定動作列」(#mobileBar)，依狀態切換「變出故事／開始念」 */
  .mobilebar{display:none;}
  @media(max-width:560px){
    .controls{display:none;}                 /* 由底部固定列取代，避免重複 */
    .mobilebar{display:flex;gap:8px;position:fixed;left:0;right:0;bottom:0;z-index:50;
      padding:8px 14px calc(8px + env(safe-area-inset-bottom));
      background:rgba(60,38,19,.93);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      box-shadow:0 -6px 20px rgba(0,0,0,.32);transition:transform .25s ease;}
    .mobilebar.hide{transform:translateY(135%);pointer-events:none;}   /* 捲到語音設定區時自動讓開 */
    .mobilebar .big{flex:1 1 0;margin:0;padding:13px 8px;font-size:15px;min-width:0;
      box-shadow:0 5px 0 rgba(0,0,0,.12);}
    .mobilebar .big:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
    .mobilebar .play{flex:1.4 1 0;}
    body{padding-bottom:86px;}
  }

  /* 故事書 */
  .book{display:none;background:linear-gradient(180deg,#f8efd9,#f1e4c8);border-radius:26px;
    border:1px solid #e0cfae;box-shadow:0 18px 44px rgba(60,38,15,.28);overflow:hidden;margin-bottom:14px;}
  .book.show{display:block;animation:pop .45s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{transform:scale(.94) translateY(8px);opacity:0;}to{transform:none;opacity:1;}}
  .scene{width:100%;display:block;}
  /* 自訂圖片場景：背景圖 + 前景人物圖（疊圖） */
  .sceneBox{position:relative;width:100%;aspect-ratio:380/170;overflow:hidden;background:#cfe6ff;}
  .sceneBox .scene{position:absolute;inset:0;width:100%;height:100%;}
  .sceneBg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  .sceneChar{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    height:82%;width:auto;max-width:60%;object-fit:contain;object-position:bottom;z-index:3;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.25));animation:pop .5s cubic-bezier(.2,.9,.3,1.3);}
  .sceneCharEmoji{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    z-index:2;font-size:64px;line-height:1;}
  /* 主畫面即時預覽 */
  .preview-card .sceneBox{border-radius:16px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);}
  .prev-cap{text-align:center;margin-top:10px;font-weight:800;color:var(--rose-d);font-size:16px;}
  .book .inner{padding:18px 22px 16px;}
  .book .title{font-size:23px;text-align:center;color:var(--rose-d);margin:0 0 14px;font-weight:800;}
  .book .body{font-size:20px;line-height:2.05;letter-spacing:.3px;}
  .book .body .sentence{display:inline;transition:.25s;}
  .book .body .sentence.active{background:linear-gradient(180deg,transparent 58%,#fff0b8 58%);
    border-radius:8px;}
  .word{display:inline-block;white-space:nowrap;}
  .ch{display:inline-block;transition:color .12s, transform .12s;border-radius:6px;
    will-change:transform;}
  .ch.read{color:var(--rose-d);}
  /* 朗讀中：當前字/詞變紅色，不跳動 */
  .ch.cursor{color:#e00;background:none;padding:0;border-radius:0;box-shadow:none;animation:none;}
  .word.cursor{color:#e00;background:none;padding:0;border-radius:0;box-shadow:none;animation:none;}
  .word.cursor .ch{color:#e00;background:none;box-shadow:none;}
  @keyframes bounce{
    0%{transform:translateY(0) scale(1);}
    40%{transform:translateY(-12px) scale(1.42) rotate(-4deg);}
    70%{transform:translateY(-3px) scale(1.2) rotate(2deg);}
    100%{transform:translateY(0) scale(1.18);}
  }
  .moral{margin-top:16px;background:linear-gradient(90deg,#fff6d6,#ffe9f2);border-radius:16px;
    padding:13px 15px;font-size:18px;font-weight:800;color:#c46a00;display:flex;gap:8px;
    align-items:flex-start;}
  .moral .mtxt .ch.read{color:#e07a00;}
  .moral .star{animation:twinkle 1.6s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{transform:scale(1) rotate(0);opacity:1;}50%{transform:scale(1.25) rotate(18deg);opacity:.8;}}

  /* 語音 */
  .voicebar{display:none;}
  .voicebar.show{display:block;}
  .voicebar .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:11px;}
  .voicebar .row .lbl{font-size:14px;font-weight:700;min-width:74px;}
  select{font-family:inherit;font-size:14.5px;padding:10px 12px;border-radius:13px;
    border:2px solid var(--line);background:var(--cream);flex:1;min-width:160px;color:var(--ink);}
  .chip{cursor:pointer;border:2px solid var(--line);border-radius:14px;padding:8px 14px;
    font-size:14px;font-weight:700;background:var(--cream);user-select:none;}
  .chip.sel{background:#fff0f6;border-color:var(--rose);color:var(--rose-d);}
  .playrow{display:flex;gap:10px;flex-wrap:wrap;}
  .play{flex:1;min-width:150px;background:linear-gradient(90deg,#3ddc84,#23b56a);}
  .stop{flex:0 0 auto;min-width:96px;background:linear-gradient(90deg,#ff8a8a,#ff6b6b);}
  .save{flex:0 0 auto;min-width:110px;background:linear-gradient(90deg,#ffc24d,#ff9f1c);}
  .warn{display:none;background:#fff4f4;color:#d4516b;border-radius:13px;padding:9px 12px;
    font-size:13px;margin-top:8px;border:1px solid #ffd9e0;}
  .hint{font-size:12px;color:var(--soft);text-align:center;margin-top:8px;}

  /* 我的故事書 */
  .shelf{display:none;}
  .shelf.show{display:block;}
  .saved{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;
    background:var(--cream);margin-bottom:8px;border:1px solid var(--line);}
  .saved .st{flex:1;font-weight:700;font-size:14.5px;cursor:pointer;}
  .saved .st small{display:block;color:var(--soft);font-weight:600;font-size:11.5px;margin-top:1px;}
  .saved button{border:none;border-radius:10px;padding:7px 11px;font-size:12.5px;cursor:pointer;
    font-family:inherit;font-weight:700;}
  .saved .open{background:#e9f3ff;color:#3b82d6;}
  .saved .del{background:#ffe9ec;color:#e0566f;}
  .empty{color:var(--soft);font-size:13.5px;text-align:center;padding:6px;}

  /* 故事控制列（標題下方）：開始唸／停／換語言 */
  .storybar{display:flex;gap:8px;margin:2px 0 14px;}
  .storybar .big{flex:1;min-width:0;padding:12px 8px;font-size:16px;box-shadow:0 5px 0 rgba(0,0,0,.12);}
  .storybar .big:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .storybar .play{flex:1.3;}
  .lang{width:100%;background:linear-gradient(90deg,#7fd0ff,#9b8cff);}
  .storybar .lang{width:auto;flex:1.1;}

  @media print{
    body{background:#fff;padding:0;}
    header.top,.card,.controls,.voicebar,.shelf,.hint,.langrow{display:none !important;}
    .book{box-shadow:none;border:none;}
  }

  /* 角色選項格：顯示角色圖片 */
  .opt-img{width:130px;height:130px;object-fit:contain;object-position:bottom center;display:block;margin:0 auto 2px;}
  .opt-fb{font-size:30px;line-height:1.05;}
  .opt:has(.opt-img) .opt-fb{display:none;}

  /* 巫師裝飾（左側） */
  .deco-wizard{position:fixed;bottom:0;left:0;z-index:0;pointer-events:none;
    width:120px;opacity:.6;
    filter:drop-shadow(0 0 20px rgba(140,80,255,.75));}
  .deco-wizard img{width:100%;height:auto;object-fit:contain;object-position:bottom;}
  @media(max-width:880px){.deco-wizard{display:none;}}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="logo" id="logoWrap">
      <img id="logoImg" src="assets/theme/title.png" alt="魔法故事屋"
           style="max-height:90px;max-width:100%;object-fit:contain;display:block;">
    </div>
  </header>

  <div id="groups"></div>

  <!-- 即時預覽：選好主角和場景，這裡會立刻合成畫面 -->
  <div class="card preview-card" id="previewCard">
    <h2>👀 預覽你的故事畫面</h2>
    <div class="preview-wrap">
      <img src="assets/theme/preview.png" class="preview-img" alt="">
      <div class="prev-cap" id="previewCap">先選一個主角和一個場景，這裡會立刻把人物放進場景裡給你看～</div>
      <div class="sceneBox" id="previewStage" style="display:none"></div>
    </div>
  </div>

  <div class="controls">
    <button class="big gen img-btn" id="genBtn" onclick="generate()">
      <img src="assets/theme/btn-main.png" alt="變出一個故事！"
           onerror="this.closest('button').classList.remove('img-btn');this.outerHTML='🎲 變出一個故事！'">
    </button>
    <button class="big rand img-btn" onclick="randomizeAll()">
      <img src="assets/theme/btn-rand.png" alt="全部隨機"
           onerror="this.closest('button').classList.remove('img-btn');this.outerHTML='🎰 全部隨機'">
    </button>
  </div>

  <!-- 故事書 -->
  <div class="book" id="book">
    <div id="sceneWrap"></div>
    <div class="inner">
      <div class="title" id="storyTitle"></div>
      <!-- 故事控制列：就在標題下面，直接唸故事／換語言 -->
      <div class="storybar">
        <button class="big play" onclick="speak()">▶ 開始唸</button>
        <button class="big stop" onclick="stopSpeak()">⏹ 停</button>
        <button class="big lang" id="langBtn" onclick="toggleLang()">🌍 英文版</button>
      </div>
      <div class="body" id="storyBody"></div>
      <div class="moral" id="storyMoral"><span class="star">🌟</span><span class="mtxt" id="moralTxt"></span></div>
    </div>
  </div>

  <!-- 語音 -->
  <div class="card voicebar" id="voicebar">
    <h2>🔧 語音設定（選聲音・速度）</h2>
    <div class="row">
      <span class="lbl">🎤 聲音</span>
      <select id="voiceSel"></select>
    </div>
    <div class="row">
      <span class="lbl">⏩ 速度</span>
      <span class="chip" data-rate="0.8" onclick="setRate(this,0.8)">🐢 慢慢</span>
      <span class="chip sel" data-rate="1.0" onclick="setRate(this,1.0)">🚶 剛好</span>
      <span class="chip" data-rate="1.2" onclick="setRate(this,1.2)">🐇 快快</span>
    </div>
    <div class="playrow">
      <button class="big save" onclick="saveStory()">⭐ 收藏</button>
      <button class="big save" style="background:linear-gradient(90deg,#9b8cff,#7c6cff)" onclick="window.print()">🖨 列印</button>
    </div>
    <div class="warn" id="ttsWarn">😅 這個瀏覽器好像沒有中文／英文語音，建議用 Chrome 或 Edge 打開喔！</div>
    <div class="hint">唸到哪個字，那個字就會放大跳起來、亮晶晶～跟著一起唸吧！（第一次按可能要等一下下）<br>
      💡 想聽<b>更像真人</b>的聲音嗎？用 <b>Microsoft Edge</b> 打開，選單裡有「✨ 擬真」的微軟神經網路語音（免費），語氣最自然喔！</div>
  </div>

  <!-- 我的故事書 -->
  <div class="card shelf" id="shelf">
    <h2>📚 我的故事書</h2>
    <div id="shelfList"></div>
  </div>
</div>

<!-- 手機底部固定動作列：依有無故事切換「變出故事 / 開始念」 -->
<div class="mobilebar" id="mobileBar"></div>

<script>
/* =================== 選項 =================== */
const GROUPS = [
  {key:'char', icon:'👤', short:'主角', title:'👤 主角是誰？', opts:[
    {id:'princess',e:'👸',l:'公主'},{id:'prince',e:'🤴',l:'王子'},
    {id:'fairy',e:'🧚',l:'小精靈'},{id:'wizard',e:'🧙',l:'小巫師'},
    {id:'mermaid',e:'🧜‍♀️',l:'美人魚'},{id:'astronaut',e:'👨‍🚀',l:'太空人'},
    {id:'robot',e:'🤖',l:'機器人'},{id:'superhero',e:'🦸',l:'小英雄'},
    {id:'dino',e:'🦕',l:'小恐龍'},{id:'animal',e:'🐰',l:'小兔子'}]},
  {key:'attr', icon:'💛', short:'味道', title:'💛 故事的味道？', opts:[
    {id:'wisdom',e:'🧠',l:'智慧'},{id:'brave',e:'🦁',l:'勇敢'},{id:'happy',e:'😄',l:'快樂'},
    {id:'sad',e:'😢',l:'悲傷'},{id:'inspire',e:'✨',l:'有啟發'},
    {id:'kind',e:'💗',l:'善良'},{id:'friend',e:'🤝',l:'友情'},{id:'curious',e:'🔍',l:'好奇'},
    {id:'fable',e:'📜',l:'寓言'},{id:'reflect',e:'🪞',l:'反省'},{id:'respect',e:'🙇',l:'尊重'},
    {id:'confident',e:'💪',l:'自信'},{id:'cherish',e:'💎',l:'珍惜'},
    {id:'struggle',e:'🔥',l:'奮鬥'},{id:'warmth',e:'🥰',l:'溫馨'}]},
  {key:'loc', icon:'📍', short:'地點', title:'📍 在哪裡發生？', opts:[
    {id:'forest',e:'🌲',l:'森林'},{id:'park',e:'🛝',l:'公園'},{id:'home',e:'🏠',l:'家裡'},
    {id:'school',e:'🏫',l:'學校'},{id:'sea',e:'🌊',l:'海底'},
    {id:'space',e:'🚀',l:'外太空'},{id:'castle',e:'🏰',l:'城堡'},{id:'farm',e:'🚜',l:'農場'},
    {id:'snow',e:'⛄',l:'雪國'},{id:'beach',e:'🏖️',l:'海邊'}]},
  {key:'act', icon:'🎬', short:'時機', title:'🎬 在做什麼的時候？', opts:[
    {id:'reading',e:'📖',l:'看書的時候'},{id:'sleeping',e:'😴',l:'睡覺的時候'},{id:'playing',e:'🎮',l:'玩耍的時候'},
    {id:'eating',e:'🍽️',l:'吃飯的時候'},{id:'walking',e:'🚶',l:'散步的時候'},
    {id:'singing',e:'🎤',l:'唱歌的時候'},{id:'drawing',e:'🎨',l:'畫畫的時候'},{id:'adventure',e:'🧭',l:'探險的時候'},
    {id:'birthday',e:'🎂',l:'慶生的時候'},{id:'daze',e:'💭',l:'發呆的時候'}]},
];
const sel = {char:null, attr:null, loc:null, act:null};
const labelOf = (g,id)=>GROUPS.find(x=>x.key===g).opts.find(o=>o.id===id).l;
const emojiOf = (g,id)=>GROUPS.find(x=>x.key===g).opts.find(o=>o.id===id).e;

const rnd = a => a[Math.floor(Math.random()*a.length)];
const pick = a => Math.floor(Math.random()*a.length);
const shuffle = a => a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);
const splitSentences = t => (t.match(/[^。！？]+[。！？]?/g) || [t]).map(s=>s.trim()).filter(Boolean);
const splitEn = t => (t.match(/[^.!?]+[.!?]+["']?|\S[^.!?]*$/g) || [t]).map(s=>s.trim()).filter(Boolean);
const joinEn = a => a.length<=1 ? (a[0]||'') : a.slice(0,-1).join(', ')+' and '+a[a.length-1];

/* 先把所有隨機選擇定下來，之後中文／英文版都用同一份「劇本」來產出 */
function buildPlan(){
  const arc=ARC[sel.attr], l=LOC[sel.loc];
  return {
    char:sel.char, attr:sel.attr, loc:sel.loc, act:sel.act,
    openI:pick(OPENS.zh), whereI:pick(l.where), senseI:pick(l.sense), openerI:pick(ACT[sel.act].opener),
    thingI:pick(l.thing), problemI:pick(arc.problem), tryI:pick(arc.try),
    actionI:pick(arc.action), sayI:pick(arc.say), closeI:pick(arc.close),
    moralI:pick(arc.moral), endI:pick(ENDINGS.zh),
    friends:shuffle(FRIENDS.map((_,i)=>i)).slice(0,3),  // 沿路遇到 3 位好朋友
  };
}

// 依照劇本 plan，產出指定語言（zh / en）的故事
function renderStory(plan, lang){
  const c=CHAR[plan.char], l=LOC[plan.loc], a=ACT[plan.act], arc=ARC[plan.attr];
  const friends=plan.friends.map(i=>FRIENDS[i]);
  const P=[];
  if(lang==='en'){
    const name=c.nameEn, who=c.shortEn, where=l.whereEn[plan.whereI];
    P.push(OPENS.en[plan.openI](name, c.hintEn, where));
    P.push(`${l.senseEn[plan.senseI]}. That day, ${who} ${a.clauseEn}. ${a.openerEn[plan.openerI]}`);
    P.push(`Just then, ${l.thingEn[plan.thingI]} appeared. It turned out that ${who} ${arc.problemEn[plan.problemI]}.`);
    P.push(`${who} ${arc.tryEn[plan.tryI]}, feeling a little worried, and set off to find some friends to help.`);
    const steps=['Walking and walking','A little further along','After a few more steps'];
    friends.forEach((f,i)=>{
      P.push(`${steps[i]}, ${f.nameEn} appeared and asked kindly, "What's wrong?" ${who} shared the worry, and ${f.nameEn} ${f.giveEn}.`);
    });
    P.push(`With all these friends along, ${who} wasn't afraid anymore. ${who} ${arc.actionEn[plan.actionI]}, and happily called out: ${arc.sayEn[plan.sayI]}`);
    const pals=joinEn(friends.map(f=>f.nameEn));
    P.push(`${arc.closeEn[plan.closeI]}${ENDINGS.en[plan.endI](who, pals)}`);
    return { lang:'en',
      title:`${emojiOf('attr',plan.attr)} ${who}'s ${ATTR_EN[plan.attr]} Adventure`,
      sentences:splitEn(P.join(' ')), moral:arc.moralEn[plan.moralI] };
  } else {
    const name=c.name, where=l.where[plan.whereI];
    P.push(OPENS.zh[plan.openI](name, c.hint, where));
    P.push(`${l.sense[plan.senseI]}。這一天，${name}${a.clause}，${a.opener[plan.openerI]}`);
    P.push(`這時候，${l.thing[plan.thingI]}出現了，原來${name}${arc.problem[plan.problemI]}。`);
    P.push(`${name}${arc.try[plan.tryI]}，心裡有點著急，於是決定去找朋友幫忙。`);
    const steps=['走著走著','再往前走一點','又走了一小段路'];
    friends.forEach((f,i)=>{
      P.push(`${steps[i]}，${f.name}出現了，關心地問：「你怎麼了呀？」${name}把煩惱說了出來，${f.name}就${f.give}。`);
    });
    P.push(`有了大家的陪伴，${name}不再害怕了。他${arc.action[plan.actionI]}，開心地大聲說：${arc.say[plan.sayI]}`);
    const pals=friends.map(f=>f.name).join('、');
    P.push(`${arc.close[plan.closeI]}${ENDINGS.zh[plan.endI](name, pals)}`);
    return { lang:'zh',
      title:`${emojiOf('attr',plan.attr)}《${name}的${labelOf('attr',plan.attr)}之旅》`,
      sentences:splitSentences(P.join('')), moral:arc.moral[plan.moralI] };
  }
}

/* =================== 產生流程 =================== */
let readSeq=[], sentenceStart=[], chars=[], wrappers=[], readLang='zh';
let currentPlan=null, currentLang='zh';
function generate(){
  GROUPS.forEach(g=>{ if(!sel[g.key]) sel[g.key]=rnd(g.opts).id; });
  renderOpts();
  stopSpeak();
  currentPlan=buildPlan();
  currentLang='zh';
  showStory(renderStory(currentPlan,'zh'));
}
function randomizeAll(){ GROUPS.forEach(g=> sel[g.key]=rnd(g.opts).id); renderOpts(); generate(); }

// 中／英文切換：用同一份劇本重新產出，並挑對應的語音
function toggleLang(){
  if(!currentPlan) return;
  stopSpeak();
  currentLang = currentLang==='en' ? 'zh' : 'en';
  showStory(renderStory(currentPlan, currentLang));
  pickVoiceForLang(currentLang==='en'?'en':'zh');
}

// 把一段文字拆成逐字 span 加進 chars（英文用「字詞」包起來，避免單字被拆行）
function appendChars(container, text, lang){
  if(lang==='en'){
    let word=null;
    for(const ch of text){
      if(ch===' '){
        const sp=document.createElement('span'); sp.className='ch'; sp.textContent=' ';
        container.appendChild(sp); chars.push(sp); word=null;
      }else{
        if(!word){ word=document.createElement('span'); word.className='word'; word._start=chars.length; container.appendChild(word); }
        const sp=document.createElement('span'); sp.className='ch'; sp.textContent=ch;
        sp._word=word; word.appendChild(sp); chars.push(sp);
        word._end=chars.length;   // 半開區間 [_start,_end)，記在全域 chars 的索引
      }
    }
  }else{
    for(const ch of text){ const sp=document.createElement('span'); sp.className='ch'; sp.textContent=ch; container.appendChild(sp); chars.push(sp); }
  }
}

function showStory(story){
  currentStory=story;
  const lang=story.lang||'zh'; readLang=lang;
  document.getElementById('sceneWrap').innerHTML=sceneHTML(sel.loc, sel.char, CHAR[sel.char].e);
  document.getElementById('storyTitle').textContent=story.title;
  document.getElementById('langBtn').textContent = lang==='en' ? '🇹🇼 中文' : '🌍 英文';

  // 逐字 span（卡拉OK 用）
  readSeq=[...story.sentences, story.moral];
  sentenceStart=[]; let acc=0;
  readSeq.forEach(s=>{ sentenceStart.push(acc); acc+=s.length; });
  chars=[]; wrappers=[];

  const bodyEl=document.getElementById('storyBody'); bodyEl.innerHTML='';
  story.sentences.forEach((s)=>{
    const w=document.createElement('span'); w.className='sentence';
    appendChars(w, s, lang);
    bodyEl.appendChild(w); wrappers.push(w);
  });
  const moralEl=document.getElementById('moralTxt'); moralEl.innerHTML='';
  appendChars(moralEl, story.moral, lang);
  wrappers.push(moralEl);

  document.getElementById('book').classList.add('show');
  document.getElementById('voicebar').classList.add('show');
  updateMobileBar();
  document.getElementById('book').scrollIntoView({behavior:'smooth',block:'start'});
}

// 手機底部固定列：沒故事時「變出故事」；有故事時換成「開始念／停／再變」
function updateMobileBar(){
  const bar=document.getElementById('mobileBar'); if(!bar) return;
  const hasStory=document.getElementById('book').classList.contains('show');
  // 唸故事／換語言已移到故事標題下方，底部固定列只負責「變出故事」
  const errGen=`this.closest('button').classList.remove('img-btn');this.outerHTML='🎲 '+this.alt`;
  const errRand=`this.closest('button').classList.remove('img-btn');this.outerHTML='🎰 隨機'`;
  bar.innerHTML = hasStory
    ? `<button class="big gen img-btn" onclick="generate()"><img src="assets/theme/btn-main.png" alt="再變一個故事" onerror="${errGen}"></button>`
    : `<button class="big gen img-btn" onclick="generate()"><img src="assets/theme/btn-main.png" alt="變出一個故事！" onerror="${errGen}"></button>
       <button class="big rand img-btn" onclick="randomizeAll()"><img src="assets/theme/btn-rand.png" alt="隨機" onerror="${errRand}"></button>`;
}
// 捲到語音設定區時，讓底部固定列自動滑開，不擋住整塊設定
function setupBarAutoHide(){
  const bar=document.getElementById('mobileBar'), watch=document.getElementById('voicebar');
  if(!bar||!watch||!('IntersectionObserver' in window)) return;
  new IntersectionObserver(es=>es.forEach(e=>bar.classList.toggle('hide', e.isIntersecting)),
    {threshold:0.1}).observe(watch);
}

/* =================== 場景：自訂圖片優先，找不到才用內建插圖 ===================
   把圖片放進這兩個資料夾，檔名要跟選項代號一樣（小寫）：
     assets/backgrounds/<背景代號>.png   例：海底 sea.png、城堡 castle.png
     assets/characters/<角色代號>.png    例：公主 princess.png、美人魚 mermaid.png
   背景代號：forest park home school sea space castle farm snow beach
   角色代號：princess girl beggar prince animal robot dino wizard astronaut mermaid superhero fairy chef scientist insect
   ── 有提供圖片就用圖片（背景滿版、人物站在前面）；沒有就自動用原本的內建插圖／emoji。 */
function sceneHTML(loc, charId, charE){
  // 先試 .png，找不到再試 .svg，都沒有才退回內建插圖／emoji
  const tryNext = "(this.dataset.t?this.remove():(this.dataset.t=1,this.src=this.dataset.svg))";
  const bgPng=`assets/backgrounds/${loc}.png`,  bgSvg=`assets/backgrounds/${loc}.svg`;
  const chPng=`assets/characters/${charId}.png`, chSvg=`assets/characters/${charId}.svg`;
  return `<div class="sceneBox">
    <div class="scene">${sceneSVG(loc, '')}</div>
    <img class="sceneBg" src="${bgPng}" data-svg="${bgSvg}" alt="" loading="lazy" onerror="${tryNext}">
    <div class="sceneCharEmoji">${charE}</div>
    <img class="sceneChar" src="${chPng}" data-svg="${chSvg}" alt="" loading="lazy"
         onload="var e=this.parentElement.querySelector('.sceneCharEmoji'); if(e) e.style.display='none';"
         onerror="${tryNext}">
  </div>`;
}

    castle:`<rect x="150" y="62" width="80" height="78" fill="#cbbfe6"/><rect x="138" y="50" width="22" height="90" fill="#b7a9da"/><rect x="220" y="50" width="22" height="90" fill="#b7a9da"/><polygon points="138,50 149,30 160,50" fill="#8f7fc0"/><polygon points="220,50 231,30 242,50" fill="#8f7fc0"/><rect x="180" y="100" width="20" height="40" rx="10" fill="#7a6aa8"/>`,
    farm:`<circle cx="325" cy="46" r="22" fill="#ffe27a"/><rect x="55" y="82" width="92" height="58" fill="#e08a5a"/><polygon points="45,82 101,46 157,82" fill="#c0623a"/><rect x="92" y="104" width="22" height="36" fill="#fff6e6"/>`,
    snow:`<circle cx="325" cy="46" r="20" fill="#fff3c4"/><circle cx="70" cy="55" r="3.5" fill="#fff"/><circle cx="125" cy="38" r="3" fill="#fff"/><circle cx="255" cy="52" r="3" fill="#fff"/><path d="M0 145 Q95 105 190 145 T380 145 Z" fill="#ffffff"/>`,
    beach:`<circle cx="320" cy="46" r="22" fill="#ffe27a"/><path d="M30 42 q8 -7 16 0 M52 42 q8 -7 16 0" stroke="#fff" fill="none" stroke-width="2.2"/><rect y="116" width="380" height="26" fill="#5fb8e8"/><path d="M0 120 q20 -7 40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0 t40 0" stroke="#bfeaff" fill="none" stroke-width="3"/>`,
  }[loc]||'';
  const ground={forest:'#8fd49e',park:'#9ce0b4',home:'#e7c79a',school:'#9ce0b4',sea:'#3a6ea5',
    space:'#241a4d',castle:'#c2b3e0',farm:'#8fd49e',snow:'#eef6ff',beach:'#f1e0a8'}[loc]||'#9ce0b4';
  return `<svg class="scene" viewBox="0 0 380 170" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

      <stop offset="0" stop-color="${sky[0]}"/><stop offset="1" stop-color="${sky[1]}"/></linearGradient></defs>
    <rect width="380" height="170" fill="url(#sk)"/>
    ${deco}
    <rect y="140" width="380" height="30" fill="${ground}"/>
    ${charE?`<text x="190" y="122" font-size="64" text-anchor="middle">${charE}</text>`:''}
  </svg>`;
}

/* =================== 選項 UI =================== */
// 主角：公主、王子固定排最前面，其餘每次載入隨機排列
let activeTab=0;
const orderCache={};
// 選項顯示順序（主角固定公主／王子在前，其餘隨機；只算一次，避免切換時跳動）
function displayOpts(g){
  if(orderCache[g.key]) return orderCache[g.key];
  let arr;
  if(g.key!=='char'){ arr=g.opts; }
  else{
    const head=['princess','prince'];
    const front=head.map(id=>g.opts.find(o=>o.id===id)).filter(Boolean);
    const rest=shuffle(g.opts.filter(o=>!head.includes(o.id)));
    arr=[...front,...rest];
  }
  orderCache[g.key]=arr; return arr;
}
function switchTab(i){ activeTab=i; renderGroups(); }
function renderGroups(){
  // 上方頁籤：顯示分類名稱＋目前已選的摘要
  const tabs=GROUPS.map((g,i)=>{
    const chosen=sel[g.key];
    const num=('00'+(i+1)).slice(-3);
    const imgSrc=`assets/theme/but${num}${i===activeTab?'b':''}.png`;
    const errHandler=`this.closest('.tab').classList.add('tab-no-img');this.insertAdjacentHTML('afterend','<span class=\\'tab-name\\'>${g.icon} ${g.short}</span>');this.remove()`;
    const pick=chosen
      ? `<span class="tab-pick">${emojiOf(g.key,chosen)} ${labelOf(g.key,chosen)}</span>`
      : ``;
    return `<button class="tab${i===activeTab?' active':''}${chosen?' done':''}" onclick="switchTab(${i})">
      <img src="${imgSrc}" class="tab-bg-img" alt="${g.short}" loading="lazy" onerror="${errHandler}">
      ${pick}</button>`;
  }).join('');
  // 下方面板：只顯示目前頁籤這一組的選項
  const g=GROUPS[activeTab];
  const tryImg="(this.dataset.t?this.remove():(this.dataset.t=1,this.src=this.dataset.svg))";
  const grid=displayOpts(g).map(o=>{
    const inner=g.key==='char'
      ?`<img class="opt-img" src="assets/characters/${o.id}0.png" data-svg="assets/characters/${o.id}.svg" alt="" loading="lazy" onerror="${tryImg}"><div class="e opt-fb">${o.e}</div>`
      :`<div class="e">${o.e}</div>`;
    return `<div class="opt${sel[g.key]===o.id?' sel':''}" data-g="${g.key}" data-id="${o.id}" onclick="choose('${g.key}','${o.id}')">${inner}<div class="l">${o.l}</div></div>`;
  }).join('');
  const tabImgs={char:'who.png',attr:'what.png',loc:'where.png',act:'when.png'};
  const tabImg=tabImgs[g.key];
  const titleHtml=tabImg
    ?`<img src="assets/theme/${tabImg}" alt="${g.title}" style="max-height:56px;max-width:100%;object-fit:contain;display:block;margin:0 0 10px;" onerror="this.outerHTML='<h2>${g.title}</h2>'">`
    :`<h2>${g.title}</h2>`;
  document.getElementById('groups').innerHTML=
    `<div class="tabs">${tabs}</div><div class="card optpanel">${titleHtml}<div class="opts">${grid}</div></div>`;
  updateScenePreview();
}
function renderOpts(){ renderGroups(); }   // 相容舊呼叫（generate／randomizeAll）
function choose(g,id){
  sel[g]=id;
  // 選好就自動跳到下一個還沒選的分類；若後面都選完了就留在原地讓你繼續調整
  const idx=GROUPS.findIndex(x=>x.key===g);
  const next=GROUPS.findIndex((x,k)=>k>idx && !sel[x.key]);
  activeTab=next!==-1?next:idx;
  renderGroups();
}
// 主畫面即時預覽：選了主角／場景就立刻把人物放進場景（與故事插圖同一套疊圖）
function updateScenePreview(){
  const stage=document.getElementById('previewStage'), cap=document.getElementById('previewCap');
  if(!stage||!cap) return;
  if(!sel.char && !sel.loc){
    stage.style.display='none';
    cap.textContent='先選一個主角和一個場景，這裡會立刻把人物放進場景裡給你看～';
    return;
  }
  stage.style.display='block';
  stage.innerHTML=sceneHTML(sel.loc, sel.char, sel.char?CHAR[sel.char].e:'');
  const cl=sel.char?labelOf('char',sel.char):'（還沒選主角）';
  const ll=sel.loc?labelOf('loc',sel.loc):'（還沒選場景）';
  cap.textContent=`${cl} ＋ ${ll}`;
}

/* =================== 語音 + 卡拉OK 反白 =================== */
const synth=window.speechSynthesis;
let voices=[], voiceList=[], chosenVoice=null, rate=1.0;
// 只保留：國語（台灣）、English（普通話／大陸語音一律排除）
function voiceCat(v){
  const s=v.lang+' '+v.name;
  // 只保留國語（台灣）與 English；普通話（中國大陸）一律排除
  if(/zh[-_]?CN|zh[-_]?Hans|cmn|Xiaoxiao|Yunyang|Yunxi|Huihui|Kangkang|Yaoyao|China|Mandarin/i.test(s)) return null;
  if(/zh[-_]?TW|zh[-_]?Hant|Taiwan|Yating|Hanhan|Zhiwei|HsiaoChen|HsiaoYu|Meijia/i.test(s)) return 'tw';
  if(/^en|English/i.test(s)) return 'en';
  return null;
}
const CAT_LABEL={tw:'🇹🇼 國語（台灣）',en:'🇬🇧 English'};
const CAT_ORDER={tw:0,en:1};
function cleanName(v){ return v.name.replace(/Microsoft|Google|Online|Natural|\(.*?\)|-/g,'').trim()||v.lang; }
// 擬真（神經網路）語音：名字含 Natural / Neural / Online，多半在 Edge 出現
function isNatural(v){ return /Natural|Neural|Online/i.test(v.name); }
// 偵測 App 內建瀏覽器（LINE／FB／IG／微信等 WebView），這些多半不支援唸故事
function isInApp(){
  const u=navigator.userAgent||'';
  return /Line\/|FBAN|FBAV|FB_IAB|Instagram|MicroMessenger|; wv\)|musical_ly|TikTok/i.test(u);
}
function setTtsWarn(){
  const w=document.getElementById('ttsWarn');
  if(isInApp()){
    w.innerHTML='😅 你好像是用 App（LINE／FB／IG…）裡面開的，這種瀏覽器不能唸故事喔！請點右上角「⋯」選「用瀏覽器開啟」，或複製網址用 <b>Safari／Chrome</b> 打開～';
  }else{
    w.innerHTML='😅 這個瀏覽器好像沒有中文／英文語音，建議用 <b>Chrome／Edge</b>（電腦）或 <b>Safari</b>（iPhone）打開喔！';
  }
  w.style.display='block';
}
function loadVoices(){
  if(!synth) return;
  voices=synth.getVoices();
  voiceList=voices.map((v,i)=>({v,i,c:voiceCat(v),nat:isNatural(v)})).filter(x=>x.c);
  // 台灣語音只保留「國語（台灣）」這顆（名稱用中文標示者），其餘台灣語音不顯示；英文不受影響
  const twNamed=voiceList.filter(x=>x.c==='tw' && /國語|臺灣|台灣/.test(x.v.name));
  if(twNamed.length) voiceList=voiceList.filter(x=> x.c!=='tw' || twNamed.includes(x));
  // 先依語言（台灣→英文），同語言內「擬真語音」排最前面
  voiceList.sort((a,b)=> CAT_ORDER[a.c]-CAT_ORDER[b.c] || (b.nat-a.nat));
  const s=document.getElementById('voiceSel');
  if(voiceList.length){
    s.innerHTML=voiceList.map(x=>`<option value="${x.i}">${x.nat?'✨ ':''}${CAT_LABEL[x.c]}｜${cleanName(x.v)}${x.nat?'（擬真）':''}</option>`).join('');
    chosenVoice=voices[voiceList[0].i];
    s.onchange=e=>chosenVoice=voices[+e.target.value];
    const hasZh=voiceList.some(x=>x.c==='tw');
    document.getElementById('ttsWarn').style.display=hasZh?'none':'block';
  }else if(voices.length){
    // 有語音但被過濾掉（例如只有大陸普通話）：仍可用，預設用系統第一顆，不擋唸故事
    s.innerHTML='<option value="0">（系統預設語音）</option>';
    chosenVoice=voices[0];
    setTtsWarn();
  }else{
    s.innerHTML='<option>（語音載入中…）</option>';
    setTtsWarn();
  }
}
// 依語言自動挑語音：優先「擬真」語音；中文挑國語（台灣）、英文挑 English
function pickVoiceForLang(lang){
  if(!voiceList.length) return;
  const c = lang==='en' ? 'en' : 'tw';
  const found = voiceList.find(x=>x.c===c && x.nat) || voiceList.find(x=>x.c===c) || voiceList[0];
  chosenVoice=voices[found.i];
  document.getElementById('voiceSel').value=found.i;
}
if(synth){
  loadVoices(); synth.onvoiceschanged=loadVoices;
  // 手機（iOS／部分 Android）onvoiceschanged 常常不觸發，改用輪詢重試抓語音
  let tries=0;
  const vt=setInterval(()=>{
    if((synth.getVoices()||[]).length){ loadVoices(); clearInterval(vt); }
    else if(++tries>20) clearInterval(vt);   // 最多試約 6 秒
  },300);
}
else setTtsWarn();

function setRate(el,r){ rate=r; document.querySelectorAll('.chip[data-rate]').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); }
let curCursorEl=null;
function clearCursor(){
  document.querySelectorAll('.cursor').forEach(c=>c.classList.remove('cursor'));
  curCursorEl=null;
}
// 只在游標單位（字／單字）改變時才換 class，避免每幀重觸發跳動畫
function setCursorEl(el){
  if(curCursorEl===el) return;
  if(curCursorEl) curCursorEl.classList.remove('cursor');
  curCursorEl=el;
  if(el) el.classList.add('cursor');
}
function clearHL(){ chars.forEach(c=>c.classList.remove('read','cursor')); clearCursor(); wrappers.forEach(w=>w.classList.remove('active')); }
function highlightUpTo(n){
  // 英文：以「整個單字」為游標單位；中文：以單一字為單位
  const cw = (readLang==='en' && chars[n]) ? chars[n]._word : null;
  const readUntil = cw ? cw._start : n;          // 唸到的單字「之前」才上已讀色
  for(let k=0;k<readUntil;k++) chars[k]&&chars[k].classList.add('read');
  if(cw){
    for(let k=cw._start;k<cw._end;k++) chars[k]&&chars[k].classList.remove('read'); // 目前單字整顆白字跳，不留已讀色
    setCursorEl(cw);
  }else{
    const el=chars[n];
    setCursorEl(el && el.textContent!==' ' ? el : null);  // 空白不當游標
  }
}
function fillSentence(i){ const end=sentenceStart[i]+readSeq[i].length; for(let k=0;k<end;k++) chars[k]&&chars[k].classList.add('read'); clearCursor(); }
let rafId=null, learnedMs={zh:0,en:0};   // 各語言「每字實際毫秒」(rate=1)，用前一句時長學習校正
function speak(){
  if(!synth||readSeq.length===0) return;
  if(!chosenVoice) loadVoices();   // iOS 常在第一次點擊（使用者手勢）後才有語音
  synth.cancel(); clearHL();
  let i=0;
  (function next(){
    if(i>=readSeq.length){ chars.forEach(c=>c.classList.add('read')); clearCursor(); return; }
    const u=new SpeechSynthesisUtterance(readSeq[i]);
    if(chosenVoice){ u.voice=chosenVoice; u.lang=chosenVoice.lang; } else u.lang='zh-TW';
    u.rate=rate;
    const base=sentenceStart[i], idx=i, len=readSeq[i].length;
    // 反白跳字與唸的速度同步：用時間估算平滑前進，再用瀏覽器的 boundary 事件即時校正
    u.pitch=1.05;  // 接近自然音調（太高會像卡通、不像真人）
    const base0 = learnedMs[readLang] || (/^en/i.test(u.lang)?70:240);
    let msPerChar = base0/(rate||1);  // 每個字大約幾毫秒
    let startT=0, startWall=0, shownIdx=-1, lastBoundary=-1, boundaryCount=0;
    function place(ci){
      ci=Math.max(0,Math.min(ci,len-1));
      if(ci<=shownIdx) return;          // 只往前，不倒退
      shownIdx=ci; highlightUpTo(base+ci);
    }
    function tick(now){
      if(!startT) startT=now;
      const elapsed=now-startT;
      const est=Math.floor(elapsed/msPerChar);
      // 以 boundary（聲音實際唸到的字）為準，反白不超前；瀏覽器不發 boundary 時才退回時間估算
      let cap;
      if(boundaryCount>0) cap=lastBoundary;           // 精準貼著聲音
      else if(elapsed<450) cap=0;                     // 先等第一個 boundary，避免開頭就衝太快
      else cap=len-1;                                 // 真的沒有 boundary 支援（如部分 Safari）
      place(Math.min(est, cap));
      rafId=requestAnimationFrame(tick);
    }
    u.onstart=()=>{
      wrappers.forEach(w=>w.classList.remove('active'));
      wrappers[idx]&&wrappers[idx].classList.add('active');
      startT=0; startWall=performance.now(); shownIdx=-1; lastBoundary=-1; boundaryCount=0; place(0);
      cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick);
    };
    u.onboundary=(e)=>{
      if(e.charIndex==null) return;
      const ci=Math.min(e.charIndex, len-1);
      boundaryCount++; lastBoundary=ci;
      place(ci);                          // 聲音唸到哪，反白就到哪
    };
    u.onend=()=>{
      cancelAnimationFrame(rafId);
      // 用這句的實際時長學習真正的語速，讓沒有 boundary 的瀏覽器下一句更準
      const dur=performance.now()-startWall;
      if(dur>250 && len>0){ const perChar=dur/len*(rate||1);
        learnedMs[readLang]=learnedMs[readLang]? learnedMs[readLang]*0.5+perChar*0.5 : perChar; }
      fillSentence(idx); i++; next();
    };
    synth.speak(u);
  })();
}
function stopSpeak(){ if(synth) synth.cancel(); cancelAnimationFrame(rafId); clearHL(); }

/* =================== 我的故事書（收藏/列印）=================== */
let currentStory=null;
function loadShelf(){ try{ return JSON.parse(localStorage.getItem('storybook')||'[]'); }catch(e){ return []; } }
function saveStory(){
  if(!currentStory) return;
  const shelf=loadShelf();
  shelf.unshift({...currentStory, loc:sel.loc, char:sel.char, charE:CHAR[sel.char].e, plan:currentPlan, ts:Date.now()});
  localStorage.setItem('storybook', JSON.stringify(shelf.slice(0,30)));
  renderShelf();
  const b=event.target; const old=b.textContent; b.textContent='⭐ 已收藏!'; setTimeout(()=>b.textContent=old,1200);
}
function renderShelf(){
  const shelf=loadShelf(); const box=document.getElementById('shelf');
  box.classList.toggle('show', shelf.length>0);
  document.getElementById('shelfList').innerHTML = shelf.length? shelf.map((s,i)=>`
    <div class="saved">
      <div class="st" onclick="openStory(${i})">${s.charE} ${s.title.replace(/^[^《]*/,'')||s.title}
        <small>${new Date(s.ts).toLocaleDateString()}</small></div>
      <button class="open" onclick="openStory(${i})">翻開</button>
      <button class="del" onclick="delStory(${i})">刪</button>
    </div>`).join('') : '<div class="empty">還沒有收藏的故事～按 ⭐ 收藏喜歡的故事吧！</div>';
}
function openStory(i){
  const s=loadShelf()[i]; if(!s) return;
  sel.loc=s.loc||sel.loc;
  currentPlan=s.plan||null;            // 有劇本才能中英切換
  currentLang=s.lang||'zh';
  showStory({title:s.title, sentences:s.sentences, moral:s.moral, lang:currentLang});
  // 還原插圖：用收藏時記的背景與角色（有自訂圖片就會自動套用）
  document.getElementById('sceneWrap').innerHTML=sceneHTML(s.loc||sel.loc, s.char||sel.char, s.charE||'🧒');
}
function delStory(i){
  const shelf=loadShelf(); shelf.splice(i,1);
  localStorage.setItem('storybook', JSON.stringify(shelf)); renderShelf();
}


/* =================== 初始化 =================== */
renderGroups();
renderShelf();
updateMobileBar();
setupBarAutoHide();
